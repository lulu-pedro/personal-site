document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"max-width: 660px; margin: 0 auto; padding: 72px 36px 100px; animation: fadeUp 0.65s ease both;\">\n\n  <!-- NAME + PHOTO -->\n  <header style=\"display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; margin-bottom: 48px; flex-wrap: wrap;\">\n    <div style=\"flex: 1; min-width: 240px;\">\n      <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; font-weight: 400; color: #AEAEAA; margin-bottom: 10px;\">Hi, I'm<\u002Fp>\n      <h1 style=\"font-family: 'DM Serif Display', Georgia, serif; font-size: clamp(58px, 9vw, 84px); font-weight: 400; line-height: 0.95; letter-spacing: -0.5px; color: #6B5EC8; margin-bottom: 16px;\">\n        Laura<br>Pedrosa\n      <\u002Fh1>\n\n    <\u002Fdiv>\n    <image-slot id=\"laura-photo\" shape=\"rounded\" radius=\"16\" placeholder=\"Add photo\" style=\"width: 180px; height: 180px; flex-shrink: 0;\"><\u002Fimage-slot>\n  <\u002Fheader>\n\n  <hr style=\"border: none; border-top: 1px solid #E4E1DA; margin-bottom: 48px;\">\n\n  <!-- BIO -->\n  <section style=\"margin-bottom: 52px;\">\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 17px; font-weight: 400; color: #2E2E2C; line-height: 1.8; text-wrap: pretty;\">\n      Laura Pedrosa is a product lead with 10+ years of experience across tech, consulting, and mission-driven organizations. She works at the intersection of strategy, research, and cross-functional execution, helping teams cut through the noise, stay close to their customers, and ship work that actually matters. Based in Brooklyn, NY.\n    <\u002Fp>\n  <\u002Fsection>\n\n  <!-- NOW -->\n  <section style=\"margin-bottom: 52px;\">\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #B8B6B0; margin-bottom: 16px;\">Right now<\u002Fp>\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; font-weight: 400; color: #2E2E2C; line-height: 1.8; text-wrap: pretty;\">\n      She's Product Lead at <span style=\"color: #6B5EC8; font-weight: 500;\">Zenda Technologies<\u002Fspan> in New York City. In practice, that means she owns the roadmap, runs QA, leads customer research, and writes the product communications that keep investors and users in the loop. She's the connective tissue between product, engineering, and design, setting priorities, making the hard calls, and doing whatever it takes to get things shipped.\n    <\u002Fp>\n  <\u002Fsection>\n\n  <hr style=\"border: none; border-top: 1px solid #E4E1DA; margin-bottom: 52px;\">\n\n  <!-- HIGHLIGHTS -->\n  <section style=\"margin-bottom: 52px;\">\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #B8B6B0; margin-bottom: 36px;\">A bit of background<\u002Fp>\n\n    <div style=\"display: flex; flex-direction: column; gap: 36px;\">\n\n      <div style=\"display: flex; gap: 24px; align-items: flex-start;\">\n        <span style=\"font-family: 'DM Serif Display', Georgia, serif; font-size: 24px; font-weight: 400; color: #6B5EC8; flex-shrink: 0; line-height: 1; margin-top: 2px;\">01<\u002Fspan>\n        <div>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #CFCDC8; margin-bottom: 8px;\">Consulting &amp; Strategy<\u002Fp>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; color: #4E4E4C; line-height: 1.8; text-wrap: pretty;\">At Zenda Consulting, she led an operations engagement for a global CPG company that identified $400K in cost savings and mapped out how teams should actually work together. She also directed a 4-month B2C product redesign that increased engagement and brought in a $500K follow-on contract.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; gap: 24px; align-items: flex-start;\">\n        <span style=\"font-family: 'DM Serif Display', Georgia, serif; font-size: 24px; font-weight: 400; color: #6B5EC8; flex-shrink: 0; line-height: 1; margin-top: 2px;\">02<\u002Fspan>\n        <div>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #CFCDC8; margin-bottom: 8px;\">Design, UX &amp; Research<\u002Fp>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; color: #4E4E4C; line-height: 1.8; text-wrap: pretty;\">Laura holds a master's in Interaction Design from Carnegie Mellon, and it shapes how she thinks about both product and research. She has run design workshops, conducted usability studies, and led concept validation across a range of products. At Zenda Technologies, she cut usability study cycles by 50% without sacrificing the depth of insight.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; gap: 24px; align-items: flex-start;\">\n        <span style=\"font-family: 'DM Serif Display', Georgia, serif; font-size: 24px; font-weight: 400; color: #6B5EC8; flex-shrink: 0; line-height: 1; margin-top: 2px;\">03<\u002Fspan>\n        <div>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #CFCDC8; margin-bottom: 8px;\">Nonprofit, Fundraising &amp; Database Management<\u002Fp>\n          <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; color: #4E4E4C; line-height: 1.8; text-wrap: pretty;\">Earlier in her career, Laura spent years in the nonprofit sector at Pathfinder International and JA Worldwide, working across development, fundraising, and donor communications. She managed donor databases, supported grant reporting, and built the communications infrastructure that keeps organizations connected to their supporters. At JA Worldwide, she launched their first donor newsletter and drove the communication and event strategy for the organization's 100th Anniversary Gala.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr style=\"border: none; border-top: 1px solid #E4E1DA; margin-bottom: 52px;\">\n\n  <!-- EDUCATION -->\n  <section style=\"margin-bottom: 60px;\">\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #B8B6B0; margin-bottom: 24px;\">Education<\u002Fp>\n    <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n      <div style=\"display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap;\">\n        <div>\n          <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; font-weight: 500; color: #18181A;\">MPS, Interaction Design · MA, Design<\u002Fspan>\n          <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; color: #888882; margin-left: 10px;\">Carnegie Mellon University<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; color: #B8B6B0; white-space: nowrap;\">2020 – 2022<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap;\">\n        <div>\n          <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; font-weight: 500; color: #18181A;\">BA, Art History &amp; Arts Management<\u002Fspan>\n          <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; color: #888882; margin-left: 10px;\">University of Richmond<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; color: #B8B6B0; white-space: nowrap;\">2014<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr style=\"border: none; border-top: 1px solid #E4E1DA; margin-bottom: 52px;\">\n\n  <!-- PERSONAL -->\n  <section style=\"margin-bottom: 60px;\">\n    <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #B8B6B0; margin-bottom: 28px;\">Outside work<\u002Fp>\n    <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n      <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; color: #4E4E4C; line-height: 1.8; text-wrap: pretty;\">\n        Laura runs <span style=\"color: #6B5EC8; font-weight: 500;\">Prospect Park Soccer<\u002Fspan>, a volunteer soccer collective in Brooklyn with over 500 members. What started as a love of pickup soccer has grown into a real community. She organizes weekly programming year-round, handles operations, and keeps the whole thing going. It's one of the things she's most proud of.\n      <\u002Fp>\n      <p style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 14.5px; color: #4E4E4C; line-height: 1.8; text-wrap: pretty;\">\n        She also serves on the Board of Trustees at Commonwealth School, her alma mater, as part of the Development Committee.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT FOOTER -->\n  <div style=\"font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px;\">\n    <a href=\"https://linkedin.com/in/pedrosa-laura\" target=\"_blank\" style=\"color: #6B5EC8; text-decoration: none; border-bottom: 1px solid #B8B0E8;\">linkedin.com/in/pedrosa-laura<\u002Fa>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
